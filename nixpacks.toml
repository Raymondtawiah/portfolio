[phases.setup]
nixPkgs = ["...", "php83", "php83Packages.composer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[variables]
APP_ENV = "production"

[start]
cmd = "heroku-php-apache2 public/"
